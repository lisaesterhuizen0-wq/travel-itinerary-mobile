<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Sample Traveller — Travel Itinerary Oct 1–7</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #FAFBFC; color: #334155;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #FAFBFC; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 100%);
    padding: 20px 16px 14px; color: #fff;
  }
  .header-eyebrow { font-size: 11px; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; margin-bottom: 4px; }
  .header-name { font-size: 22px; font-weight: 700; line-height: 1.2; }
  .header-route { font-size: 13px; opacity: 0.7; margin-top: 2px; }

  /* Day pills */
  .day-selector {
    display: flex; overflow-x: auto; gap: 6px; padding: 12px 16px 8px;
    background: #fff; border-bottom: 1px solid #E2E8F0;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .day-selector::-webkit-scrollbar { display: none; }
  .day-pill {
    flex: 0 0 auto; padding: 8px 14px; border-radius: 20px;
    border: 1px solid #E2E8F0; background: #fff; color: #64748B;
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: all 0.2s; font-family: inherit;
  }
  .day-pill.active {
    border: 2px solid #1E3A5F; background: #1E3A5F; color: #fff;
  }

  /* Day info bar */
  .day-info {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; background: #fff; border-bottom: 1px solid #F1F5F9;
  }
  .day-city { font-size: 16px; font-weight: 700; color: #0F172A; }
  .day-date { font-size: 12px; color: #64748B; margin-top: 1px; }
  .day-tag {
    font-size: 11px; font-weight: 600; color: #1E3A5F; background: #EFF6FF;
    padding: 4px 10px; border-radius: 12px;
  }

  /* Tabs */
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #E2E8F0; }
  .tab {
    flex: 1; padding: 10px 0; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; font-family: inherit;
    background: transparent; color: #94A3B8;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab.active { color: #1E3A5F; border-bottom-color: #1E3A5F; }

  /* Content area */
  .content { padding: 12px 16px 100px; }

  /* Timeline item */
  .timeline-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #F1F5F9; }
  .timeline-item.has-detail { cursor: pointer; }
  .ti-time {
    flex: 0 0 52px; font-size: 12px; font-weight: 700; color: #64748B;
    padding-top: 2px; text-align: right; font-variant-numeric: tabular-nums;
  }
  .ti-dot-col {
    flex: 0 0 12px; display: flex; flex-direction: column; align-items: center; padding-top: 6px;
  }
  .ti-dot { border-radius: 50%; }
  .ti-dot.normal { width: 7px; height: 7px; }
  .ti-dot.highlight { width: 10px; height: 10px; border-width: 2px; border-style: solid; }
  .ti-line { width: 1px; flex: 1; background: #E2E8F0; margin-top: 4px; }
  .ti-content { flex: 1; min-width: 0; }
  .ti-label-row { display: flex; align-items: center; gap: 6px; }
  .ti-icon { font-size: 15px; }
  .ti-label { font-size: 14px; line-height: 1.3; }
  .ti-label.bold { font-weight: 700; }
  .ti-label.normal { font-weight: 500; }
  .ti-arrow {
    font-size: 10px; color: #94A3B8; margin-left: auto;
    transition: transform 0.2s; display: inline-block;
  }
  .ti-arrow.open { transform: rotate(180deg); }
  .ti-detail {
    margin-top: 8px; padding: 10px 12px; border-radius: 10px;
    border-left: 3px solid; font-size: 13px; line-height: 1.5;
    white-space: pre-line;
  }

  /* Contact card */
  .card {
    background: #fff; border-radius: 12px; padding: 14px 16px;
    border: 1px solid #E2E8F0; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px;
  }
  .card-name { font-size: 14px; font-weight: 600; color: #0F172A; }
  .card-role { font-size: 12px; color: #64748B; margin-top: 2px; }
  .card-btn {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 50%;
    background: #EFF6FF; text-decoration: none; font-size: 18;
  }

  /* Accounts */
  .acct-card {
    background: #fff; border-radius: 12px; padding: 14px 16px;
    border: 1px solid #E2E8F0; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px;
  }
  .acct-label { font-size: 13px; color: #64748B; font-weight: 500; }
  .acct-value {
    font-size: 15px; font-weight: 700; color: #0F172A;
    font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: 0.5px;
  }
  .tip-box {
    margin-top: 12px; padding: 14px 16px; border-radius: 12px;
    background: #FFFBEB; border: 1px solid #FDE68A;
  }
  .tip-title { font-size: 12px; font-weight: 600; color: #92400E; margin-bottom: 4px; }
  .tip-text { font-size: 13px; color: #78350F; line-height: 1.5; }

  .section-label {
    font-size: 12px; color: #94A3B8; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

const CONTACTS = [
  {name:"Lisa Myburgh",role:"Executive Assistant",phone:null,email:"assistant@example.com"},
  {name:"Regal Wings — Regina",role:"Travel Agent (Primary)",phone:"+18008773552",display:"+1 800-877-3552"},
  {name:"Travel Pro's — Tom",role:"Travel Agent (Backup)",phone:"+18003427521",display:"+1 800-342-7521"},
  {name:"Hertz Gold Support",role:"Car Rental",phone:"+18006543131",display:"+1 800-654-3131"},
  {name:"Blacklane 24/7",role:"Chauffeur Service",phone:"+18443252526",display:"+1 844-325-2526"},
];

const QUICK_REF = [
  {label:"United Premier 1K",value:"UVM27180"},
  {label:"Hyatt Silver",value:"75523H88"},
  {label:"Hertz Gold",value:"9886656"},
  {label:"Marriott Bonvoy Gold",value:"7554898"},
];

const TYPE_COLORS = {
  flight:{bg:"#EFF6FF",border:"#3B82F6",text:"#1E40AF"},
  hotel:{bg:"#F0FDF4",border:"#22C55E",text:"#166534"},
  dining:{bg:"#FFF7ED",border:"#F97316",text:"#9A3412"},
  work:{bg:"#FAF5FF",border:"#A855F7",text:"#6B21A8"},
  leisure:{bg:"#FDF2F8",border:"#EC4899",text:"#9D174D"},
  transport:{bg:"#F8FAFC",border:"#94A3B8",text:"#475569"},
  rest:{bg:"#F8FAFC",border:"#94A3B8",text:"#475569"},
};

// ── STATE ──
let activeDay = 0;
let activeTab = "schedule";
let expandedItems = new Set();

function render() {
  const day = DAYS[activeDay];
  const app = document.getElementById("app");

  let html = `
    <div class="header">
      <div class="header-eyebrow">Travel Itinerary</div>
      <div class="header-name">Sample Traveller</div>
      <div class="header-route">Oct 1–7, 2024 · SFO → NYC → LDN → BER → SFO</div>
    </div>

    <div class="day-selector" id="daySelector">
      ${DAYS.map((d,i) => `
        <button class="day-pill${i===activeDay?" active":""}" onclick="selectDay(${i})">
          ${d.emoji} ${d.label}
        </button>
      `).join("")}
    </div>

    <div class="day-info">
      <div>
        <div class="day-city">${day.city}</div>
        <div class="day-date">${day.date}</div>
      </div>
      <div class="day-tag">${day.tag}</div>
    </div>

    <div class="tabs">
      <button class="tab${activeTab==="schedule"?" active":""}" onclick="selectTab('schedule')">Schedule</button>
      <button class="tab${activeTab==="contacts"?" active":""}" onclick="selectTab('contacts')">Contacts</button>
      <button class="tab${activeTab==="accounts"?" active":""}" onclick="selectTab('accounts')">Accounts</button>
    </div>

    <div class="content">
  `;

  if (activeTab === "schedule") {
    html += day.schedule.map((item, idx) => {
      const c = TYPE_COLORS[item.type] || TYPE_COLORS.transport;
      const isOpen = expandedItems.has(idx);
      const hasDet = !!item.detail;
      const isLast = idx === day.schedule.length - 1;

      return `
        <div class="timeline-item${hasDet?" has-detail":""}" ${hasDet?`onclick="toggleItem(${idx})"`:""}>
          <div class="ti-time">${item.time}</div>
          <div class="ti-dot-col">
            <div class="ti-dot ${item.hl?"highlight":"normal"}"
              style="background:${c.border};${item.hl?`border-color:${c.text};`:""}"></div>
            ${!isLast?'<div class="ti-line"></div>':""}
          </div>
          <div class="ti-content">
            <div class="ti-label-row">
              <span class="ti-icon">${item.icon}</span>
              <span class="ti-label ${item.hl?"bold":"normal"}"
                style="color:${item.hl?c.text:"#334155"}">${item.label}</span>
              ${hasDet?`<span class="ti-arrow${isOpen?" open":""}">▼</span>`:""}
            </div>
            ${hasDet && isOpen?`
              <div class="ti-detail" style="background:${c.bg};border-left-color:${c.border};color:${c.text}">
                ${item.detail.replace(/\n/g,"<br>")}
              </div>
            `:""}
          </div>
        </div>
      `;
    }).join("");
  }

  if (activeTab === "contacts") {
    html += `<div class="section-label">Emergency & Support</div>`;
    html += CONTACTS.map(c => `
      <div class="card">
        <div>
          <div class="card-name">${c.name}</div>
          <div class="card-role">${c.role}</div>
        </div>
        ${c.phone
          ? `<a href="tel:${c.phone}" class="card-btn">📞</a>`
          : `<a href="mailto:${c.email}" class="card-btn">✉️</a>`
        }
      </div>
    `).join("");
  }

  if (activeTab === "accounts") {
    html += `<div class="section-label">Loyalty & Membership Numbers</div>`;
    html += QUICK_REF.map(r => `
      <div class="acct-card">
        <div class="acct-label">${r.label}</div>
        <div class="acct-value">${r.value}</div>
      </div>
    `).join("");
    html += `
      <div class="tip-box">
        <div class="tip-title">💡 Tip</div>
        <div class="tip-text">Show these numbers at check-in counters and car rental desks to ensure points are linked to your stays and bookings.</div>
      </div>
    `;
  }

  html += `</div>`;
  app.innerHTML = html;
}

function selectDay(i) {
  activeDay = i;
  expandedItems.clear();
  render();
  // Scroll the active pill into view
  setTimeout(() => {
    const sel = document.getElementById("daySelector");
    const btn = sel?.children[i];
    if (btn) btn.scrollIntoView({ behavior:"smooth", inline:"center", block:"nearest" });
  }, 10);
}

function selectTab(t) {
  activeTab = t;
  render();
}

function toggleItem(idx) {
  expandedItems.has(idx) ? expandedItems.delete(idx) : expandedItems.add(idx);
  render();
}

// Initial render
render();
</script>
</body>
</html>
